name: PassiveStack Pi-Image Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: ./deploy
      RPI_BOOT_FIRMWARE_VERSIONS: "v8"
      SKIP_IMAGES: 1
      NOOBS: 0
      SKIP_NOOBS: 1
      IMG_SUFFIX: "-PassiveStack-v1.3"

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: 🛠️ Setup pi-gen
      run: |
        echo "📦 Installiere Abhängigkeiten..."
        sudo apt-get update
        sudo apt-get install -y \
          coreutils quilt parted qemu-user-static debootstrap zerofree zip \
          dosfstools bsdtar libcap2-bin grep rsync xz-utils file git curl bc \
          qemu-utils kpartx pigz
    
    - name: 🔧 Configure pi-gen
      run: |
        echo "⚙️ Konfiguriere pi-gen..."
        cd pi-gen
        git checkout bullseye
        
        echo "📝 Schreibe config..."
        cat > config << EOF
        IMG_NAME=PassiveStack-v1.3
        RELEASE=bullseye
        DEPLOY_ZIP=0
        DEPLOY_DIR="../$DEPLOY_DIR"
        LOCALE_DEFAULT=en_US.UTF-8
        TARGET_HOSTNAME=passivestack
        KEYBOARD_KEYMAP=de
        KEYBOARD_LAYOUT="German"
        TIMEZONE_DEFAULT=Europe/Berlin
        ENABLE_SSH=1
        PUBKEY_ONLY_SSH=0
        SSH_ENABLE_ROOT=0
        USE_QCOW2=0
        COMPRESS_DISK=1
        IMG_SUFFIX=$IMG_SUFFIX
        RPI_BOOT_FIRMWARE_VERSIONS=$RPI_BOOT_FIRMWARE_VERSIONS
        SKIP_IMAGES=$SKIP_IMAGES
        NOOBS=$NOOBS
        SKIP_NOOBS=$SKIP_NOOBS
        STAGE_LIST="stage0 stage1 stage2 stage3"
        EOF
        
        echo "📄 Config-Inhalt:"
        cat config
        
        echo "📁 Prüfe Stage-Verzeichnisse..."
        ls -la stage3/

    - name: 🏗️ Build Image
      run: |
        echo "🚀 Starte Build-Prozess..."
        cd pi-gen
        sudo ./build.sh
        
        echo "✅ Build abgeschlossen!"
        echo "📁 Resultate:"
        ls -la "$DEPLOY_DIR"/

    - name: 📦 Upload Image Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: PassiveStack-Image
        path: |
          deploy/*.img
          deploy/*.txt
          deploy/*.sha256
        if-no-files-found: error
        retention-days: 7

    - name: 📊 Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Logs
        path: |
          pi-gen/logs/
          pi-gen/debug/
        if-no-files-found: warn
        retention-days: 3

    - name: 🧹 Cleanup Workspace
      if: always()
      run: |
        echo "🧹 Säubere Workspace..."
        sudo rm -rf pi-gen/work/*
        sudo rm -rf pi-gen/deploy/*
        df -h
