name: PassiveStack Pi-Image Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      DEPLOY_DIR: ./deploy

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static debootstrap \
            zerofree zip dosfstools libarchive-tools libcap2-bin \
            grep rsync xz-utils file git curl bc qemu-utils kpartx pigz

      - name: 🔧 Setup pi-gen Config
        run: |
          cd pi-gen
          git checkout bullseye
          
          # CONFIG OHNE HEREDOC - ECHO FÜR JEDE ZEILE
          echo "IMG_NAME=PassiveStack-v1.3" > config
          echo "RELEASE=bullseye" >> config
          echo "DEPLOY_ZIP=0" >> config
          echo 'DEPLOY_DIR="../deploy"' >> config
          echo "LOCALE_DEFAULT=en_US.UTF-8" >> config
          echo "TARGET_HOSTNAME=passivestack" >> config
          echo "KEYBOARD_KEYMAP=de" >> config
          echo 'KEYBOARD_LAYOUT="German"' >> config
          echo "TIMEZONE_DEFAULT=Europe/Berlin" >> config
          echo "ENABLE_SSH=1" >> config
          echo "PUBKEY_ONLY_SSH=0" >> config
          echo "SSH_ENABLE_ROOT=0" >> config
          echo "USE_QCOW2=0" >> config
          echo "COMPRESS_DISK=1" >> config
          echo "IMG_SUFFIX=-PassiveStack-v1.3" >> config
          echo "RPI_BOOT_FIRMWARE_VERSIONS=v8" >> config
          echo "SKIP_IMAGES=1" >> config
          echo "NOOBS=0" >> config
          echo "SKIP_NOOBS=1" >> config
          echo 'STAGE_LIST="stage0 stage1 stage2 stage3"' >> config
          
          cat config

      - name: 🏗️ Build Image
        run: |
          cd pi-gen
          sudo ./build.sh || echo "Build fehlgeschlagen"
          ls -la ../deploy/ 2>/dev/null || echo "Keine deploy-Dateien"

      - name: 📦 Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PassiveStack-Image
          path: deploy/
          retention-days: 7

      - name: 🧹 Cleanup
        if: always()
        run: |
          sudo rm -rf pi-gen/work/* 2>/dev/null || true
