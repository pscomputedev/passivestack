name: PassiveStack Pi-Image Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: 🛠️ Install Dependencies
        run: |
          echo "=== INSTALL DEPENDENCIES ==="
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static debootstrap \
            zerofree zip dosfstools libarchive-tools libcap2-bin \
            grep rsync xz-utils file git curl bc qemu-utils kpartx pigz \
            xxd binfmt-support

          echo "=== SETUP QEMU ==="
          sudo update-binfmts --enable qemu-arm
          sudo update-binfmts --enable qemu-aarch64

      - name: 🔍 Check and Clone pi-gen
        run: |
          echo "=== CHECK PI-GEN SUBMODULE ==="
          
          if [ ! -d "pi-gen" ]; then
            echo "pi-gen submodule missing, cloning manually..."
            git clone https://github.com/RPi-Distro/pi-gen.git
            cd pi-gen
            git checkout bullseye
            cd ..
          else
            echo "pi-gen directory exists"
            cd pi-gen
            git checkout bullseye
            cd ..
          fi
          
          echo "=== DIRECTORY CONTENTS ==="
          ls -la
          echo "=== PI-GEN CONTENTS ==="
          ls -la pi-gen/

      - name: 🔧 Setup pi-gen Config
        run: |
          echo "=== SETUP PI-GEN CONFIG ==="
          cd pi-gen
          
          # Config erstellen - EINE PRO ZEILE
          echo "IMG_NAME=PassiveStack-v1.3" > config
          echo "RELEASE=bullseye" >> config
          echo "DEPLOY_ZIP=0" >> config
          echo "DEPLOY_DIR=../deploy" >> config
          echo "LOCALE_DEFAULT=en_US.UTF-8" >> config
          echo "TARGET_HOSTNAME=passivestack" >> config
          echo "KEYBOARD_KEYMAP=de" >> config
          echo "KEYBOARD_LAYOUT=German" >> config
          echo "TIMEZONE_DEFAULT=Europe/Berlin" >> config
          echo "ENABLE_SSH=1" >> config
          echo "PUBKEY_ONLY_SSH=0" >> config
          echo "SSH_ENABLE_ROOT=0" >> config
          echo "USE_QCOW2=0" >> config
          echo "COMPRESS_DISK=1" >> config
          echo "IMG_SUFFIX=-PassiveStack-v1.3" >> config
          echo "RPI_BOOT_FIRMWARE_VERSIONS=v8" >> config
          echo "SKIP_IMAGES=1" >> config
          echo "NOOBS=0" >> config
          echo "SKIP_NOOBS=1" >> config
          echo "STAGE_LIST=stage0 stage1 stage2 stage3" >> config
          
          echo "=== CONFIG CONTENTS ==="
          cat config

      - name: 🔍 Pre-Build Checks
        run: |
          echo "=== PRE-BUILD CHECKS ==="
          cd pi-gen
          
          echo "Build script exists:"
          ls -la build.sh
          chmod +x build.sh
          
          echo "Current user: $(whoami)"
          echo "Sudo test:"
          sudo echo "Sudo works!"
          
          echo "QEMU binfmt status:"
          update-binfmts --display | grep -E "qemu.*enabled" || echo "QEMU binfmt check"

      - name: 🏗️ Build Image
        run: |
          echo "=== BUILD IMAGE ==="
          cd pi-gen
          
          # Build mit detaillierter Ausgabe
          set -x
          sudo ./build.sh 2>&1 | tee build.log
          set +x
          
          # Prüfe Exit-Status
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Build failed with exit code ${PIPESTATUS[0]}"
            echo "Last 100 lines of build.log:"
            tail -100 build.log
            exit 1
          fi

      - name: 📋 Show Build Logs
        if: always()
        run: |
          echo "=== BUILD LOGS TAIL ==="
          if [ -f "pi-gen/build.log" ]; then
            tail -200 pi-gen/build.log
          fi
          
          echo "=== DEPLOY DIRECTORY ==="
          ls -la deploy/ 2>/dev/null || echo "No deploy directory"

      - name: 📦 Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PassiveStack-RPi-Image
          path: deploy/
          retention-days: 7

      - name: 📄 Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: pi-gen/build.log
          retention-days: 3

      - name: 🧹 Cleanup
        if: always()
        run: |
          echo "=== CLEANUP ==="
          sudo rm -rf pi-gen/work/* 2>/dev/null || true
