name: PassiveStack Pi-Image Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils parted dosfstools qemu-user-static kpartx bc binfmt-support debootstrap zerofree git

      - name: Clone pi-gen
        run: |
          git clone https://github.com/RPi-Distro/pi-gen.git
          cd pi-gen
          git checkout bullseye

      - name: Create Config File
        run: |
          cd pi-gen
          echo "IMG_NAME=PassiveStack" > config
          echo "RELEASE=bullseye" >> config
          echo "HOSTNAME=passivestack" >> config
          echo "FIRST_USER_NAME=pi" >> config
          echo "FIRST_USER_PASS=raspberry" >> config
          echo "ENABLE_SSH=1" >> config
          echo "STAGE_LIST=\"stage0 stage1 stage2\"" >> config
          echo "WORK_DIR=\"$PWD/work\"" >> config
          echo "DEPLOY_DIR=\"$PWD/deploy\"" >> config
          echo "CLEAN=1" >> config

      - name: Run pi-gen Build
        run: |
          cd pi-gen
          chmod +x build.sh
          sudo ./build.sh
