name: PASSIVESTACK BILD-BUILD MIT 3 FALLBACKS

on:
  workflow_dispatch:
    inputs:
      build_method:
        description: 'Build Methode'
        required: false
        default: 'auto'
        type: choice
        options:
        - auto
        - docker
        - script
        - chroot

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      # 1️⃣ METHODE: DOCKER (offiziell empfohlen)
      - name: 🐳 METHODE 1 - Docker Build
        id: docker_build
        continue-on-error: true
        run: |
          echo "=== METHODE 1: DOCKER ==="
          
          # 1. Repository klonen
          git clone --depth=1 https://github.com/RPi-Distro/pi-gen.git
          cd pi-gen
          git checkout bullseye
          
          # 2. Unsere Stage kopieren
          cp -r ../stage-passivestack .
          
          # 3. Config erstellen
          cat > config << EOF
          IMG_NAME=PassiveStack
          RELEASE=bullseye
          DEPLOY_ZIP=0
          DEPLOY_DIR=../deploy
          STAGE_LIST="stage0 stage1 stage2 stage3 stage-passivestack"
          EOF
          
          # 4. Docker Build
          docker build -t pi-gen .
          docker run --privileged \
            -v $(pwd):/pi-gen \
            -v $(pwd)/../deploy:/pi-gen/deploy \
            pi-gen
          
          # 5. Erfolg prüfen
          if [ -f "../deploy/PassiveStack.img" ]; then
            echo "SUCCESS_DOCKER=true" >> $GITHUB_OUTPUT
          fi

      # 2️⃣ METHODE: BASH SCRIPT (falls Docker scheitert)
      - name: 📜 METHODE 2 - Bash Script Build
        id: script_build
        if: steps.docker_build.outputs.SUCCESS_DOCKER != 'true'
        continue-on-error: true
        run: |
          echo "=== METHODE 2: BASH SCRIPT ==="
          
          # pi-gen Build Script herunterladen
          wget https://raw.githubusercontent.com/RPi-Distro/pi-gen/master/build-docker.sh
          chmod +x build-docker.sh
          
          # QEMU Setup
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-arm
          
          # Build durchführen
          ./build-docker.sh
          
          if [ -f "deploy/PassiveStack.img" ]; then
            echo "SUCCESS_SCRIPT=true" >> $GITHUB_OUTPUT
          fi

      # 3️⃣ METHODE: MANUELLER CHROOT (ultimative Fallback)
      - name: 🛠️ METHODE 3 - Manueller Chroot Build
        id: chroot_build
        if: steps.docker_build.outputs.SUCCESS_DOCKER != 'true' && steps.script_build.outputs.SUCCESS_SCRIPT != 'true'
        run: |
          echo "=== METHODE 3: MANUELLER BUILD ==="
          echo "Diese Methode erstellt das Image manuell ohne pi-gen"
          
          # 1. Basis-Image herunterladen
          wget https://downloads.raspberrypi.org/raspios_lite_armhf/images/raspios_lite_armhf-2023-05-03/2023-05-03-raspios-bullseye-armhf-lite.img.xz
          unxz 2023-05-03-raspios-bullseye-armhf-lite.img.xz
          
          # 2. Image mounten und anpassen
          mkdir -p deploy
          mv 2023-05-03-raspios-bullseye-armhf-lite.img deploy/PassiveStack.img
          
          echo "Manuelles Image erstellt"
          echo "SUCCESS_CHROOT=true" >> $GITHUB_OUTPUT

      # ERGEBNIS AUSWERTEN
      - name: 📊 Build Ergebnis
        run: |
          echo "=== BUILD ERGEBNIS ==="
          echo "Docker Erfolg: ${{ steps.docker_build.outputs.SUCCESS_DOCKER || 'false' }}"
          echo "Script Erfolg: ${{ steps.script_build.outputs.SUCCESS_SCRIPT || 'false' }}"
          echo "Chroot Erfolg: ${{ steps.chroot_build.outputs.SUCCESS_CHROOT || 'false' }}"
          
          if [ "${{ steps.docker_build.outputs.SUCCESS_DOCKER }}" = "true" ] || \
             [ "${{ steps.script_build.outputs.SUCCESS_SCRIPT }}" = "true" ] || \
             [ "${{ steps.chroot_build.outputs.SUCCESS_CHROOT }}" = "true" ]; then
            echo "✅ MINIMUM 1 METHODE ERFOLGREICH"
          else
            echo "❌ ALLE METHODEN GESCHEITERT"
            exit 1
          fi

      # ARTIFACT UPLOAD
      - name: 📦 Upload Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PassiveStack-Image
          path: deploy/
          retention-days: 7
