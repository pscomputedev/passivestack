name: Build Raspberry Pi Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image Version'
        required: true
        default: 'v1.3'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Fix pi-gen Source
        run: |
          echo "=== REPLACE BAD SUBMODULE ==="
          
          # Lösche das nicht-existente Submodule
          rm -rf pi-gen
          
          # Klone das KORREKTE Repository
          git clone https://github.com/RPi-Distro/pi-gen.git
          cd pi-gen
          git checkout 2022-01-01-raspios-bullseye  # STABILER TAG
          
          echo "pi-gen ready at $(pwd)"

      - name: 🔧 Configure Build
        run: |
          echo "=== CREATE CONFIG ==="
          cd pi-gen
          
          # Einfache Config - GENAU WIE IM ORIGINAL
          echo "IMG_NAME=PassiveStack" > config
          echo "RELEASE=bullseye" >> config
          echo "DEPLOY_ZIP=1" >> config
          echo "DEPLOY_DIR=../deploy" >> config
          echo "ENABLE_SSH=1" >> config
          
          echo "Config created:"
          cat config

      - name: 📦 Install Dependencies
        run: |
          echo "=== INSTALL DEPS ==="
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static debootstrap \
            zerofree zip dosfstools libarchive-tools libcap2-bin \
            grep rsync xz-utils file git curl bc qemu-utils kpartx pigz \
            binfmt-support

      - name: 🏗️ Run Build
        run: |
          echo "=== START BUILD ==="
          cd pi-gen
          
          # BAUE NUR STAGE 0 ZUM TESTEN
          echo "Running stage0 test..."
          sudo ./build.sh -c config 2>&1 | tee build-stage0.log
          
          # Wenn stage0 erfolgreich, baue komplett
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "Stage0 successful, building full image..."
            sudo CLEAN=1 ./build.sh 2>&1 | tee build-full.log
          else
            echo "Stage0 failed, check logs"
            tail -50 build-stage0.log
            exit 1
          fi

      - name: 📤 Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: raspberry-pi-image
          path: |
            pi-gen/deploy/*.img
            pi-gen/deploy/*.zip
            pi-gen/deploy/*.xz
          retention-days: 7

      - name: 📄 Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            pi-gen/build-stage0.log
            pi-gen/build-full.log
          retention-days: 3
