name: Build PassiveStack Pi Image
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout passivestack repo
        uses: actions/checkout@v4
        with:
          path: passivestack
          
      - name: Install qemu-user-static
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          sudo ln -s /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm
          
      - name: Clone pi-gen (bookworm branch)
        run: git clone --depth 1 --branch bookworm https://github.com/RPi-Distro/pi-gen.git pi-gen
        
      - name: Configure pi-gen
        working-directory: pi-gen
        run: |
          # Basis-Config aus Repo
          cp ../passivestack/image/pi-gen-config config
          # Explizite Einstellungen für normales Image
          echo "NOOBS=0" >> config
          echo "DEPLOY_ZIP=1" >> config
          echo "DEPLOY_COMPRESSED=1" >> config
          
      - name: Patch sshd_config for password login
        working-directory: pi-gen
        run: |
          cat >> stage2/01-sys-tweaks/01-run.sh << 'EOF'
          # PassiveStack: Passwort-Login für SSH aktivieren
          sed -i 's/^#\?[[:blank:]]*PasswordAuthentication.*/PasswordAuthentication yes/' "${ROOTFS_DIR}/etc/ssh/sshd_config"
          echo "PasswordAuthentication yes" >> "${ROOTFS_DIR}/etc/ssh/sshd_config"
          EOF
          
      - name: Copy stage-passivestack into pi-gen
        run: cp -r passivestack/image/stage-passivestack pi-gen/stage-passivestack
        
      - name: Populate stage files from repo source
        run: |
          FILES_DIR="pi-gen/stage-passivestack/00-passivestack/files"
          mkdir -p "${FILES_DIR}/passivestack"
          mkdir -p "${FILES_DIR}/passivestack/image"
          
          # Hauptdateien
          cp passivestack/install.sh          "${FILES_DIR}/passivestack/"
          cp passivestack/bootstrap.sh        "${FILES_DIR}/passivestack/"
          cp passivestack/generate-compose.py "${FILES_DIR}/passivestack/"
          
          # Die existierende config-Datei (nicht apps.json)
          cp passivestack/config              "${FILES_DIR}/passivestack/config"
          
          # Image-Dateien
          cp passivestack/image/pi-gen-config "${FILES_DIR}/passivestack/image/"
          
          # Stage-Dateien
          if [ -d "passivestack/image/stage-passivestack" ]; then
            cp -r passivestack/image/stage-passivestack/* "${FILES_DIR}/passivestack/image/"
          fi
          
      - name: Set EXPORT_IMAGE for custom stage
        run: |
          touch pi-gen/stage-passivestack/EXPORT_IMAGE
          
      - name: Remove SKIP_IMAGES from stage2 if present
        run: |
          rm -f pi-gen/stage2/SKIP_IMAGES
          
      - name: Build image via Docker
        working-directory: pi-gen
        env:
          PIGEN_DOCKER_OPTS: "-v /usr/bin/qemu-arm-static:/usr/bin/qemu-arm-static"
        run: ./build-docker.sh
        
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: passivestack-image
          path: |
            pi-gen/deploy/*.zip
            pi-gen/deploy/*.img
            pi-gen/deploy/*.img.xz
          if-no-files-found: error
          retention-days: 7
