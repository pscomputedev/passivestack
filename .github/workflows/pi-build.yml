name: Build Raspberry Pi Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image Version'
        required: true
        default: 'v1.3'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Clone pi-gen Repository
        run: |
          echo "=== Removing old pi-gen if exists ==="
          rm -rf pi-gen
          echo "=== Cloning official pi-gen ==="
          git clone --depth=1 https://github.com/RPi-Distro/pi-gen.git
          ls -la pi-gen/

      - name: Copy Custom Stages and Create Config
        run: |
          echo "=== Copying custom stage ==="
          cp -rv stage-passivestack pi-gen/
          
          echo "=== Creating pi-gen config ==="
          cat > pi-gen/config << 'EOF'
          IMG_NAME=PassiveStack
          RELEASE=bullseye
          DEPLOY_ZIP=1
          DEPLOY_DIR=../deploy
          HOSTNAME=passivestack
          FIRST_USER_PASS=raspberry
          ENABLE_SSH=1
          STAGE_LIST=stage0 stage1 stage2 stage-passivestack
          EOF
          
          echo "=== Config content ==="
          cat pi-gen/config

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils \
            quilt \
            parted \
            qemu-user-static \
            debootstrap \
            zerofree \
            zip \
            dosfstools \
            libarchive-tools \
            libcap2-bin \
            grep \
            rsync \
            xz-utils \
            file \
            git \
            curl \
            bc \
            qemu-utils \
            kpartx \
            binfmt-support \
            pigz

      - name: Build Raspberry Pi Image
        run: |
          cd pi-gen
          echo "=== Starting build ==="
          sudo CLEAN=1 ./build.sh
          
      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: passivestack-image-${{ github.event.inputs.version }}
          path: deploy/*.img
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: pi-gen/work/*/build.log
          retention-days: 3
