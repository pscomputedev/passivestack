name: 🛠️ Pi-Gen Build FIXED

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      # 1. CHECKOUT OHNE SUBMODULES
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: false  # WICHTIG: Keine Submodules

      # 2. PI-GEN MANUELL KLONEN
      - name: 🐧 Clone pi-gen
        run: |
          echo "=== KLONE PI-GEN VON RPI-DISTRO ==="
          rm -rf pi-gen  # Falls existiert
          git clone --depth=1 https://github.com/RPi-Distro/pi-gen.git
          cd pi-gen
          git checkout 2022-01-01-raspios-bullseye
          echo "pi-gen Version: $(git describe --tags)"

      # 3. STAGES KOPIEREN
      - name: 📂 Copy Stages
        run: |
          echo "=== KOPIERE STAGES ==="
          
          # Deine Stage kopieren
          cp -r stage-passivestack pi-gen/
          
          # Config erstellen
          cat > pi-gen/config << 'EOF'
          IMG_NAME=PassiveStack
          RELEASE=bullseye
          DEPLOY_ZIP=1
          DEPLOY_DIR=../deploy
          HOSTNAME=passivestack
          FIRST_USER_PASS=raspberry
          ENABLE_SSH=1
          STAGE_LIST="stage0 stage1 stage2 stage-passivestack"
          EOF
          
          echo "Config:"
          cat pi-gen/config

      # 4. DEPENDENCIES INSTALLIEREN
      - name: 📦 Install Dependencies
        run: |
          echo "=== INSTALLIERE ABHÄNGIGKEITEN ==="
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static debootstrap \
            zerofree zip dosfstools libarchive-tools libcap2-bin \
            grep rsync xz-utils file git curl bc qemu-utils kpartx \
            binfmt-support pigz

      # 5. BUILD STARTEN
      - name: 🏗️ Build Image
        run: |
          echo "=== STARTE BUILD ==="
          cd pi-gen
          
          # Erst Stage 0 testen
          echo "Teste Stage 0..."
          sudo ./build-docker.sh -c config --stage 0 2>&1 | tee build-stage0.log
          
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "Stage 0 erfolgreich, starte kompletten Build..."
            sudo CLEAN=1 ./build-docker.sh 2>&1 | tee build-full.log
          else
            echo "Stage 0 fehlgeschlagen"
            tail -100 build-stage0.log
            exit 1
          fi

      # 6. ARTIFACTS UPLOADEN
      - name: 📤 Upload Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: passivestack-image
          path: pi-gen/deploy/*.img
          retention-days: 7

      - name: 📄 Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            pi-gen/build-stage0.log
            pi-gen/build-full.log
          retention-days: 3
