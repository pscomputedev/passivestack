name: Build Raspberry Pi Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image Version'
        required: true
        default: 'v1.3'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Clone pi-gen Repository
        run: |
          rm -rf pi-gen
          git clone --depth=1 https://github.com/RPi-Distro/pi-gen.git

      - name: Setup Custom Stage and Fix Paths
        run: |
          # WICHTIG: Symlink erstellen, damit Pfade wie "passivestack/config/" funktionieren
          ln -sf . passivestack
          
          echo "=== Verifying structure ==="
          ls -la config/
          ls -la image/
          
          # Stage kopieren (aus image/ Verzeichnis)
          if [ -d "image/stage-passivestack" ]; then
            cp -r image/stage-passivestack pi-gen/stage-passivestack
            echo "✅ Copied from image/stage-passivestack"
          else
            echo "❌ ERROR: image/stage-passivestack not found!"
            ls -la
            find . -type d -name "stage-passivestack"
            exit 1
          fi
          
          # Ausführbar machen
          chmod +x pi-gen/stage-passivestack/00-passivestack/*.sh 2>/dev/null || true
          
          echo "=== Stage content ==="
          ls -la pi-gen/stage-passivestack/
          ls -la pi-gen/stage-passivestack/00-passivestack/

      - name: Create pi-gen Config
        run: |
          cat > pi-gen/config << 'EOF'
          IMG_NAME=PassiveStack
          RELEASE=bookworm
          DEPLOY_ZIP=1
          DEPLOY_DIR=../deploy
          HOSTNAME=passivestack
          FIRST_USER_PASS=passivestack
          ENABLE_SSH=1
          STAGE_LIST="stage0 stage1 stage2 stage-passivestack"
          EOF

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static debootstrap zerofree zip \
            dosfstools libarchive-tools libcap2-bin grep rsync xz-utils file \
            git curl bc qemu-utils kpartx binfmt-support pigz

      - name: Build Image
        run: |
          cd pi-gen
          sudo CLEAN=1 ./build.sh

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: passivestack-image-${{ github.event.inputs.version }}
          path: deploy/*.img
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: pi-gen/work/*/build.log
          retention-days: 3
