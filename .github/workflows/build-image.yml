name: PassiveStack Pi-Image
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Repository (Fehlerbehebung!)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main  # ✅ Explizit Branch angeben

      - name: Setup QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          sudo rm -f /usr/local/bin/qemu-arm
          sudo ln -sf /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm

      - name: Setup pi-gen Konfiguration
        run: |
          sudo rm -rf pi-gen/config || true
          mkdir -p pi-gen/config
          chmod 755 pi-gen/config
          echo "pi-gen-config" > pi-gen/config/pi-gen.conf
          chmod 644 pi-gen/config/pi-gen.conf

      - name: Clone pi-gen
        uses: actions/checkout@v4
        with:
          repository: rp-pi/pi-gen
          path: pi-gen
          fetch-depth: 1

      - name: Copy passivestack-stage
        run: |
          mkdir -p pi-gen/stage-passivestack/00-passivestack/prerun
          chmod -R 755 pi-gen/stage-passivestack

          # Kopiere deine passivestack-stages
          [ -d "passivestack/image/stage-passivestack" ] && \
            cp -r passivestack/image/stage-passivestack pi-gen/stage-passivestack || true

          # Füge deine zusätzlichen stages hinzu
          [ -d "passivestack/image/stage-other" ] && \
            cp -r passivestack/image/stage-other pi-gen/stage-passivestack || true

      - name: Run pi-gen build
        run: |
          cd pi-gen
          ./scripts/pi-gen-config
          ./scripts/pi-gen-arm64 buster passivestack || true

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: pi-gen-passivestack
          path: pi-gen/build/result/*
