name: Build Raspberry Pi Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      
      - run: git clone --depth 1 https://github.com/RPi-Distro/pi-gen.git
      
      - working-directory: pi-gen
        run: |
          cat > config <<EOF
IMG_NAME=raspios-bookworm
RELEASE=bookworm
DEPLOY_ZIP=1
LOCALE_DEFAULT=de_DE.UTF-8
TARGET_HOSTNAME=raspberrypi
KEYBOARD_KEYMAP=de
KEYBOARD_LAYOUT=German
TIMEZONE_DEFAULT=Europe/Berlin
FIRST_USER_NAME=pi
FIRST_USER_PASS=raspberry
ENABLE_SSH=1
STAGE_LIST=stage0 stage1 stage2
EOF
      
      - working-directory: pi-gen
        run: ./build-docker.sh
        env:
          CONTINUE: 1
      
      - uses: actions/upload-artifact@v4
        with:
          name: raspios-image
          path: pi-gen/deploy/image_*.zip
          if-no-files-found: error
