name: Build PassiveStack Pi Image

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout passivestack repo
        uses: actions/checkout@v4
        with:
          path: passivestack

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          sudo ln -s /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm

      - name: Clone pi-gen (bookworm)
        run: git clone --depth 1 --branch bookworm https://github.com/RPi-Distro/pi-gen.git pi-gen

      - name: Copy pi-gen config from repo
        run: cp passivestack/image/pi-gen-config pi-gen/config

      - name: Patch sshd_config for password login
        working-directory: pi-gen
        run: |
          cat >> stage2/01-sys-tweaks/01-run.sh << 'EOF'
          sed -i 's/^#\?[[:blank:]]*PasswordAuthentication.*/PasswordAuthentication yes/' "${ROOTFS_DIR}/etc/ssh/sshd_config"
          echo "PasswordAuthentication yes" >> "${ROOTFS_DIR}/etc/ssh/sshd_config"
          EOF

      - name: Copy stage-passivestack into pi-gen
        run: cp -r passivestack/image/stage-passivestack pi-gen/stage-passivestack

      - name: Populate stage files from repo source
        run: |
          FILES_DIR="pi-gen/stage-passivestack/00-passivestack/files"
          mkdir -p "${FILES_DIR}/passivestack/config"
          mkdir -p "${FILES_DIR}/passivestack/image"

          cp passivestack/install.sh          "${FILES_DIR}/passivestack/"
          cp passivestack/bootstrap.sh        "${FILES_DIR}/passivestack/"
          cp passivestack/generate-compose.py "${FILES_DIR}/passivestack/"
          cp passivestack/status-updater.sh   "${FILES_DIR}/passivestack/" 2>/dev/null || true
          cp passivestack/config/apps.json    "${FILES_DIR}/passivestack/config/" 2>/dev/null || true
          cp passivestack/image/firstboot.sh                   "${FILES_DIR}/passivestack/image/"
          cp passivestack/image/passivestack-firstboot.service "${FILES_DIR}/"

      - name: Fix permissions
        run: chmod +x pi-gen/stage-passivestack/00-passivestack/prerun.sh

      - name: Add EXPORT_IMAGE to stage-passivestack
        run: echo "PassiveStack Image" > pi-gen/stage-passivestack/EXPORT_IMAGE

      - name: Skip desktop stages
        run: |
          for stage in pi-gen/stage3 pi-gen/stage4 pi-gen/stage5; do
            [ -d "$stage" ] && touch "${stage}/SKIP" || true
          done

      - name: Build image via Docker
        working-directory: pi-gen
        env:
          PIGEN_DOCKER_OPTS: "-v /usr/bin/qemu-arm-static:/usr/bin/qemu-arm-static"
        run: ./build-docker.sh

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: passivestack-pi-image
          path: |
            pi-gen/deploy/*.zip
            pi-gen/deploy/*.img
            pi-gen/deploy/*.img.xz
          if-no-files-found: error
          retention-days: 7
