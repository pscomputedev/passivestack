name: Build PassiveStack Image

on: 
  workflow_dispatch:  # Manueller Start über Button

jobs:
  build:
    runs-on: ubuntu-22.04  # Wichtig: 22.04, nicht latest! [4][17]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Checkout pi-gen
        run: |
          rm -rf /tmp/pi-gen
          git clone --depth 1 --branch bookworm https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static qemu-utils kpartx \
            debootstrap zerofree zip dosfstools libcap2-bin rsync \
            xz-utils file git curl bc libarchive-tools
          sudo apt-get install -y arch-test || true

      - name: Cleanup previous builds
        run: |
          sudo rm -rf /tmp/pi-gen/work

      - name: Configure and build
        run: |
          cd /tmp/pi-gen
          echo 'IMG_NAME=PassiveStack' > config
          echo 'RELEASE=bookworm' >> config

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: passivestack-image
          path: /tmp/pi-gen/deploy/*.img.xz
          if-no-files-found: error
           echo 'TARGET_HOSTNAME=passivestack' >> config
           sudo bash build.sh
