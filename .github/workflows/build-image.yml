name: Build PassiveStack Pi Image

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout passivestack repo
        uses: actions/checkout@v4
        with:
          path: passivestack

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static \
            debootstrap zerofree zip dosfstools \
            libcap2-bin rsync xz-utils file git curl bc \
            kpartx udev

      - name: Clone pi-gen (bookworm)
        run: |
          git clone --depth 1 --branch bookworm \
            https://github.com/RPi-Distro/pi-gen.git pi-gen

      - name: Copy pi-gen config from repo
        run: |
          cp passivestack/image/pi-gen-config pi-gen/config
          grep -q '^DEPLOY_ZIP' pi-gen/config \
            && sed -i 's/^DEPLOY_ZIP.*/DEPLOY_ZIP=0/' pi-gen/config \
            || echo 'DEPLOY_ZIP=0' >> pi-gen/config

      - name: Copy stage-passivestack into pi-gen
        run: |
          cp -r passivestack/image/stage-passivestack pi-gen/stage-passivestack

      - name: Populate stage files from repo source
        run: |
          FILES_DIR="pi-gen/stage-passivestack/00-passivestack/files"
          mkdir -p "${FILES_DIR}/passivestack/config"
          mkdir -p "${FILES_DIR}/passivestack/image"

          cp passivestack/install.sh          "${FILES_DIR}/passivestack/"
          cp passivestack/bootstrap.sh        "${FILES_DIR}/passivestack/"
          cp passivestack/generate-compose.py "${FILES_DIR}/passivestack/"
          cp passivestack/status-updater.sh   "${FILES_DIR}/passivestack/" 2>/dev/null || true
          cp passivestack/config/apps.json    "${FILES_DIR}/passivestack/config/" 2>/dev/null || true
          cp passivestack/image/firstboot.sh                   "${FILES_DIR}/passivestack/image/"
          cp passivestack/image/passivestack-firstboot.service "${FILES_DIR}/"

          if [ -d passivestack/dashboard ]; then
            cp -r passivestack/dashboard "${FILES_DIR}/passivestack/"
          fi

          echo "=== Files staged ==="
          find "${FILES_DIR}" -type f | sort

      - name: Fix prerun.sh permissions
        run: chmod +x pi-gen/stage-passivestack/00-passivestack/prerun.sh

      - name: Mark stages to skip (Lite, no desktop)
        run: |
          for stage in pi-gen/stage3 pi-gen/stage4 pi-gen/stage5; do
            [ -d "$stage" ] && touch "${stage}/SKIP" || true
          done
          for stage in pi-gen/stage4 pi-gen/stage5; do
            [ -d "$stage" ] && touch "${stage}/SKIP_IMAGES" || true
          done
          touch pi-gen/stage2/SKIP_IMAGES

      - name: Build image via Docker
        working-directory: pi-gen
        run: sudo bash build-docker.sh

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: passivestack-pi-image
          path: |
            pi-gen/deploy/*.img
            pi-gen/deploy/*.img.xz
          if-no-files-found: error
          retention-days: 7
