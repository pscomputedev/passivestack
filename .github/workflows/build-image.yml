name: Build Raspberry Pi Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      
      - run: git clone --depth 1 https://github.com/RPi-Distro/pi-gen.git
      
      - working-directory: pi-gen
        run: |
          echo IMG_NAME=raspios-bookworm > config
          echo RELEASE=bookworm >> config
          echo DEPLOY_ZIP=1 >> config
          echo LOCALE_DEFAULT=de_DE.UTF-8 >> config
          echo TARGET_HOSTNAME=raspberrypi >> config
          echo KEYBOARD_KEYMAP=de >> config
          echo KEYBOARD_LAYOUT=German >> config
          echo TIMEZONE_DEFAULT=Europe/Berlin >> config
          echo FIRST_USER_NAME=pi >> config
          echo FIRST_USER_PASS=raspberry >> config
          echo ENABLE_SSH=1 >> config
          echo STAGE_LIST=stage0 stage1 stage2 >> config
      
      - working-directory: pi-gen
        run: ./build-docker.sh
        env:
          CONTINUE: 1
      
      - uses: actions/upload-artifact@v4
        with:
          name: raspios-image
          path: pi-gen/deploy/image_*.zip
          if-no-files-found: error
