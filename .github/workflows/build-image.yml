name: Build PassiveStack Pi Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Dependencies installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static qemu-utils kpartx \
            debootstrap zerofree zip dosfstools libcap2-bin rsync \
            xz-utils file git curl bc arch-test libarchive-tools \
            sudo apt-get install -y arch-test || true

      - name: pi-gen klonen
        run: |
          git clone --depth 1 https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen

      - name: PassiveStack Stage einrichten
        run: |
          cp -r image/stage-passivestack /tmp/pi-gen/stage-passivestack
          mkdir -p /tmp/pi-gen/stage-passivestack/00-passivestack/files
          cp -r . /tmp/pi-gen/stage-passivestack/00-passivestack/files/passivestack/
          touch /tmp/pi-gen/stage3/SKIP
          touch /tmp/pi-gen/stage4/SKIP
          touch /tmp/pi-gen/stage5/SKIP
          touch /tmp/pi-gen/stage4/SKIP_IMAGES
          touch /tmp/pi-gen/stage5/SKIP_IMAGES

      - name: pi-gen Config erstellen
        run: |
          cat > /tmp/pi-gen/config << 'EOF2'
          IMG_NAME=PassiveStack-v1.3
          RELEASE=bookworm
          TARGET_HOSTNAME=passivestack
          FIRST_USER_NAME=pi
          FIRST_USER_PASS=passivestack
          ENABLE_SSH=1
          KEYBOARD_KEYMAP=de
          KEYBOARD_LAYOUT=German
          TIMEZONE_DEFAULT=Europe/Berlin
          LOCALE_DEFAULT=de_DE.UTF-8
          STAGE_LIST=stage0 stage1 stage2 stage-passivestack
          COMPRESS=xz
          EOF2

      - name: Pi-Image bauen
        run: |
          cd /tmp/pi-gen
          sudo bash build.sh

      - name: Image hochladen
        uses: actions/upload-artifact@v4
        with:
          name: PassiveStack-Pi-Image
          path: /tmp/pi-gen/deploy/
          retention-days: 90
