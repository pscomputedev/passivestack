name: PassiveStack Pi-Image Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch zum Checkouten'
        required: false
        default: 'main'
        type: choice
        options:
          - main
          - master
          - develop
  push:
    tags:
      - 'v*'
      - 'release-*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📋 Repository Info
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Workflow Run ID: ${{ github.run_id }}"

      - name: 🔧 Installiere Basis-Abhängigkeiten
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git \
            curl \
            wget \
            ca-certificates \
            qemu-user-static \
            parted \
            dosfstools \
            kpartx \
            rsync

      - name: 📥 Clone pi-gen
        run: |
          git clone https://github.com/RPi-Distro/pi-gen.git
          cd pi-gen
          git checkout bullseye

      - name: 📁 Prüfe pi-gen
        run: |
          cd pi-gen
          ls -la
          if [ -f "./build.sh" ]; then
            echo "✅ build.sh gefunden"
            chmod +x ./build.sh
          else
            echo "❌ build.sh nicht gefunden!"
            exit 1
          fi

      - name: ⚙️ Erstelle einfache Config
        run: |
          cd pi-gen
          cat > config << 'CONFIG_EOF'
IMG_NAME=passivestack-test
RELEASE=bullseye
HOSTNAME=passivestack
FIRST_USER_NAME=pi
FIRST_USER_PASS=raspberry
ENABLE_SSH=1
STAGE_LIST="stage0 stage1 stage2"
CLEAN=1
CONFIG_EOF
          
          echo "Config:"
          cat config

      - name: 🚀 Starte minimalen Build
        run: |
          cd pi-gen
          echo "Starte Test-Build..."
          sudo ./build.sh 2>&1 | tee build.log
          
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Test erfolgreich"
          else
            echo "❌ Test fehlgeschlagen"
            echo "Letzte 50 Zeilen:"
            tail -n 50 build.log
            exit 1
          fi

      - name: 📤 Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: pi-gen/build.log
          retention-days: 7
