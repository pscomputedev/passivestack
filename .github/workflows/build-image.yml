name: PassiveStack Pi-Image Build
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch zum Checkouten'
        required: false
        default: 'main'
        type: choice
        options:
          - main
          - master
          - develop
  push:
    tags:
      - 'v*'
      - 'release-*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read
      statuses: write
      id-token: write

    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Repository Info
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Tag: ${{ github.ref_name }}"

      - name: 🔧 Setup QEMU und Abhängigkeiten
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-user-static coreutils parted dosfstools kpartx rsync \
            bc binfmt-support build-essential crossbuild-essential-arm64 curl ca-certificates \
            git wget flex bison libssl-dev libncurses5-dev fakeroot debootstrap \
            quilt libarchive-tools arch-test qemu-utils pigz zerofree zip
          sudo rm -f /usr/local/bin/qemu-arm
          sudo ln -sf /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm
          sudo update-binfmts --enable qemu-arm

      - name: 📥 Clone offizielles pi-gen
        uses: actions/checkout@v4
        with:
          repository: RPi-Distro/pi-gen
          path: pi-gen
          fetch-depth: 1
          ref: master

      - name: 📁 Setup pi-gen Konfiguration
        run: |
          echo "IMG_NAME=passivestack" > pi-gen/config
          echo "RELEASE=bullseye" >> pi-gen/config
          echo "HOSTNAME=passivestack" >> pi-gen/config
          echo "FIRST_USER_NAME=pi" >> pi-gen/config
          echo "FIRST_USER_PASS=raspberry" >> pi-gen/config
          echo "ENABLE_SSH=1" >> pi-gen/config
          echo "TIMEZONE=Europe/Berlin" >> pi-gen/config
          echo "LOCALE_DEFAULT=de_DE.UTF-8" >> pi-gen/config
          echo "KEYBOARD_KEYMAP=de" >> pi-gen/config
          echo "KEYBOARD_LAYOUT=German" >> pi-gen/config
          echo "IMG_ROOTSIZE=3500" >> pi-gen/config
          echo "IMG_USERSIZE=1000" >> pi-gen/config
          echo "BUILD_KERNEL=false" >> pi-gen/config
          echo "COMPRESS_OUTPUTIMAGE=zip" >> pi-gen/config
          echo "STAGE_LIST=\"stage0 stage1 stage2 stage3\"" >> pi-gen/config
          cat pi-gen/config

      - name: 📂 Create Stage Files
        run: |
          mkdir -p pi-gen/stage3
          chmod -R 755 pi-gen/stage3
          
          # Erstelle Stage-Dateien mit echo-Befehlen statt Heredocs
          echo '#!/bin/bash -e' > pi-gen/stage3/00-run.sh
          echo 'echo "PassiveStack Stage 3 - Setup startet"' >> pi-gen/stage3/00-run.sh
          
          echo '#!/bin/bash -e' > pi-gen/stage3/01-run.sh
          echo 'echo "PassiveStack Stage 3 - Docker Installation"' >> pi-gen/stage3/01-run.sh
          echo 'apt-get update' >> pi-gen/stage3/01-run.sh
          echo 'apt-get install -y apt-transport-https ca-certificates curl gnupg lsb-release' >> pi-gen/stage3/01-run.sh
          echo 'curl -fsSL https://get.docker.com -o get-docker.sh' >> pi-gen/stage3/01-run.sh
          echo 'sh get-docker.sh' >> pi-gen/stage3/01-run.sh
          echo 'usermod -aG docker ${FIRST_USER_NAME}' >> pi-gen/stage3/01-run.sh
          echo 'systemctl enable docker' >> pi-gen/stage3/01-run.sh
          
          echo '#!/bin/bash -e' > pi-gen/stage3/02-run.sh
          echo 'echo "PassiveStack Stage 3 - PassiveStack Setup"' >> pi-gen/stage3/02-run.sh
          echo 'cd /home/${FIRST_USER_NAME}' >> pi-gen/stage3/02-run.sh
          echo 'sudo -u ${FIRST_USER_NAME} git clone https://github.com/pinephosphore/passivestack.git' >> pi-gen/stage3/02-run.sh
          echo 'cd passivestack' >> pi-gen/stage3/02-run.sh
          echo 'chmod +x install.sh' >> pi-gen/stage3/02-run.sh
          echo 'touch .firstboot_pending' >> pi-gen/stage3/02-run.sh
          echo 'chown ${FIRST_USER_NAME}:${FIRST_USER_NAME} .firstboot_pending' >> pi-gen/stage3/02-run.sh
          
          # Systemd Service Datei
          echo '#!/bin/bash -e' > pi-gen/stage3/03-run.sh
          echo 'echo "PassiveStack Stage 3 - Systemd Service Setup"' >> pi-gen/stage3/03-run.sh
          echo 'cat > /etc/systemd/system/passivestack-firstboot.service << EOF_SVC' >> pi-gen/stage3/03-run.sh
          echo '[Unit]' >> pi-gen/stage3/03-run.sh
          echo 'Description=PassiveStack First Boot Setup' >> pi-gen/stage3/03-run.sh
          echo 'After=network-online.target docker.service' >> pi-gen/stage3/03-run.sh
          echo 'Wants=network-online.target' >> pi-gen/stage3/03-run.sh
          echo 'ConditionPathExists=/home/pi/passivestack/.firstboot_pending' >> pi-gen/stage3/03-run.sh
          echo '[Service]' >> pi-gen/stage3/03-run.sh
          echo 'Type=oneshot' >> pi-gen/stage3/03-run.sh
          echo 'ExecStart=/bin/bash /home/pi/passivestack/install.sh' >> pi-gen/stage3/03-run.sh
          echo 'ExecStartPost=/bin/rm -f /home/pi/passivestack/.firstboot_pending' >> pi-gen/stage3/03-run.sh
          echo 'RemainAfterExit=yes' >> pi-gen/stage3/03-run.sh
          echo 'User=pi' >> pi-gen/stage3/03-run.sh
          echo 'Group=pi' >> pi-gen/stage3/03-run.sh
          echo 'StandardOutput=journal+console' >> pi-gen/stage3/03-run.sh
          echo 'StandardError=journal+console' >> pi-gen/stage3/03-run.sh
          echo '[Install]' >> pi-gen/stage3/03-run.sh
          echo 'WantedBy=multi-user.target' >> pi-gen/stage3/03-run.sh
          echo 'EOF_SVC' >> pi-gen/stage3/03-run.sh
          echo 'systemctl enable passivestack-firstboot.service' >> pi-gen/stage3/03-run.sh
          
          # Optimierungen
          echo '#!/bin/bash -e' > pi-gen/stage3/04-run.sh
          echo 'echo "PassiveStack Stage 3 - Optimierungen"' >> pi-gen/stage3/04-run.sh
          echo 'dphys-swapfile swapoff' >> pi-gen/stage3/04-run.sh
          echo 'dphys-swapfile uninstall' >> pi-gen/stage3/04-run.sh
          echo 'systemctl disable dphys-swapfile' >> pi-gen/stage3/04-run.sh
          echo 'sed -i "s/#PasswordAuthentication yes/PasswordAuthentication yes/" /etc/ssh/sshd_config' >> pi-gen/stage3/04-run.sh
          echo 'sed -i "s/#PubkeyAuthentication yes/PubkeyAuthentication yes/" /etc/ssh/sshd_config' >> pi-gen/stage3/04-run.sh
          echo 'sed -i "s/PermitRootLogin yes/PermitRootLogin no/" /etc/ssh/sshd_config' >> pi-gen/stage3/04-run.sh
          echo 'mkdir -p /etc/docker' >> pi-gen/stage3/04-run.sh
          echo 'cat > /etc/docker/daemon.json << EOF_DOCK' >> pi-gen/stage3/04-run.sh
          echo '{' >> pi-gen/stage3/04-run.sh
          echo '  "log-driver": "json-file",' >> pi-gen/stage3/04-run.sh
          echo '  "log-opts": {' >> pi-gen/stage3/04-run.sh
          echo '    "max-size": "10m",' >> pi-gen/stage3/04-run.sh
          echo '    "max-file": "3"' >> pi-gen/stage3/04-run.sh
          echo '  },' >> pi-gen/stage3/04-run.sh
          echo '  "storage-driver": "overlay2"' >> pi-gen/stage3/04-run.sh
          echo '}' >> pi-gen/stage3/04-run.sh
          echo 'EOF_DOCK' >> pi-gen/stage3/04-run.sh
          
          # Finalisierung
          echo '#!/bin/bash -e' > pi-gen/stage3/99-finish.sh
          echo 'echo "PassiveStack Stage 3 - Finalisierung"' >> pi-gen/stage3/99-finish.sh
          echo 'cat > /etc/motd << EOF_MOTD' >> pi-gen/stage3/99-finish.sh
          echo '#################################################' >> pi-gen/stage3/99-finish.sh
          echo '#     PassiveStack Raspberry Pi Image           #' >> pi-gen/stage3/99-finish.sh
          echo '#     https://passivecompute.de                 #' >> pi-gen/stage3/99-finish.sh
          echo '#                                               #' >> pi-gen/stage3/99-finish.sh
          echo '#     Das System wird automatisch eingerichtet. #' >> pi-gen/stage3/99-finish.sh
          echo '#     Bitte warten Sie bis zum ersten Boot.     #' >> pi-gen/stage3/99-finish.sh
          echo '#################################################' >> pi-gen/stage3/99-finish.sh
          echo 'EOF_MOTD' >> pi-gen/stage3/99-finish.sh
          echo 'cat > /etc/issue.net << EOF_BANNER' >> pi-gen/stage3/99-finish.sh
          echo 'PassiveStack Image - https://passivecompute.de' >> pi-gen/stage3/99-finish.sh
          echo 'EOF_BANNER' >> pi-gen/stage3/99-finish.sh
          echo 'echo "PassiveStack Image Build abgeschlossen"' >> pi-gen/stage3/99-finish.sh
          
          # Berechtigungen setzen
          chmod +x pi-gen/stage3/*.sh
          touch pi-gen/stage3/EXPORT_IMAGE
          ls -la pi-gen/stage3/

      - name: 🛠️ Run pi-gen Build
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          cd pi-gen
          echo "📋 Konfiguration:"
          cat config
          echo ""
          echo "📁 Stages vorhanden:"
          ls -la stage*
          echo ""
          echo "🚀 Starte Build mit Stages: stage0 stage1 stage2 stage3"
          sudo ./build.sh
          if [ $? -eq 0 ]; then
            echo "✅ Build erfolgreich!"
            echo "📦 Erstellte Dateien:"
            ls -la deploy/
          else
            echo "❌ Build fehlgeschlagen!"
            exit 1
          fi

      - name: 📦 Upload Build-Resultate
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: passivestack-pi-image-${{ github.sha }}
          path: |
            pi-gen/deploy/*.zip
            pi-gen/deploy/*.img
          retention-days: 30
          if-no-files-found: error

      - name: 📝 Upload Logs (für Debugging)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-${{ github.sha }}
          path: |
            pi-gen/build.log
            pi-gen/debug/
            **/*.log
          retention-days: 7

      - name: 🧹 Aufräumen
        if: always()
        run: |
          sudo rm -rf pi-gen/work/
          sudo rm -rf pi-gen/deploy/

      - name: ✅ Build erfolgreich
        if: success()
        run: |
          echo "✅ PassiveStack Pi-Image Build abgeschlossen!"
          echo "📦 Das Image steht zum Download bereit."
          echo "🔧 Architektur: ARM64 (Raspberry Pi)"
          echo "📊 Release: Raspberry Pi OS Bullseye"
          echo "⚡ Enthält: Docker + PassiveStack Auto-Setup"
