name: PassiveStack Pi-Image Workflow
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup QEMU (korrigiert)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          sudo rm -f /usr/local/bin/qemu-arm
          sudo ln -sf /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm

      - name: Setup pi-gen (korrigiert)
        run: |
          # Falls pi-gen Ordner existiert, bereinigen
          sudo rm -rf pi-gen || true
          
          # Config-Ordner neu erstellen
          mkdir -p pi-gen/config
          chmod 755 pi-gen/config
          
          # Konfiguration generieren
          echo "pi-gen-config" > pi-gen/config/pi-gen.conf
          chmod 644 pi-gen/config/pi-gen.conf

      - name: Clone pi-gen
        uses: actions/checkout@v4
        with:
          repository: rp-pi/pi-gen
          path: pi-gen
          fetch-depth: 1

      - name: Copy stage-passivestack (korrigiert)
        run: |
          # Stage-Ordner erstellen mit permissions
          mkdir -p pi-gen/stage-passivestack/00-passivestack/prerun
          chmod -R 755 pi-gen/stage-passivestack

          # Stage-Dateien kopieren (falls existieren)
          [ -d "passivestack/image/stage-passivestack" ] && \
            cp -r passivestack/image/stage-passivestack pi-gen/stage-passivestack || true

      - name: Populate stage files (korrigiert)
        run: |
          # Verzeichnisstruktur mit existenzprüfung
          mkdir -p "pi-gen/stage-passivestack/00-passivestack/files/passivestack"
          mkdir -p "pi-gen/stage-passivestack/00-passivestack/files/passivestack/config"
          
          # Dateien kopieren (mit existenzprüfung)
          cp passivestack/install.sh pi-gen/stage-passivestack/00-passivestack/files/passivestack/ 2>/dev/null || true
          cp passivestack/bootstrap.sh pi-gen/stage-passivestack/00-passivestack/files/passivestack/ 2>/dev/null || true
          cp passivestack/generate-compose.py pi-gen/stage-passivestack/00-passivestack/files/passivestack/ 2>/dev/null || true
          cp passivestack/status-updater.sh pi-gen/stage-passivestack/00-passivestack/files/passivestack/ 2>/dev/null || true
          
          [ -f "passivestack/config/apps.json" ] && \
            cp passivestack/config/apps.json pi-gen/stage-passivestack/00-passivestack/files/passivestack/config/ || true

          [ -f "passivestack/image/firstboot.sh" ] && \
            cp passivestack/image/firstboot.sh pi-gen/stage-passivestack/00-passivestack/files/passivestack/image/ || true

          [ -f "passivestack/image/passivestack-firstboot.service" ] && \
            cp passivestack/image/passivestack-firstboot.service pi-gen/stage-passivestack/00-passivestack/files/passivestack/image/ || true

      - name: Fix permissions
        run: chmod -R +x pi-gen/stage-passivestack/00-passivestack/

      - name: Add EXPORT_IMAGE
        run: echo "PassiveStack Image" > pi-gen/stage-passivestack/EXPORT_IMAGE

      - name: Skip desktop stages
        run: |
          for stage in pi-gen/stage3 pi-gen/stage4 pi-gen/stage5; do
            [ -d "$stage" ] && touch "${stage}/SKIP" || true
          done

      - name: Build image via Docker
        working-directory: pi-gen
        env:
          PIGEN_DOCKER_OPTS: "-v /usr/bin/qemu-arm-static:/usr/bin/qemu-arm-static"
        run: ./build-docker.sh

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: passivestack-pi-image
          path: |
            pi-gen/deploy/*.zip
            pi-gen/deploy/*.img
            pi-gen/deploy/*.img.xz
          if-no-files-found: error
          retention-days: 7
