name: PassiveStack Pi-Image Test

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  test-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Basic Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget

      - name: Clone pi-gen
        run: |
          git clone https://github.com/RPi-Distro/pi-gen.git
          cd pi-gen
          git checkout bullseye
          ls -la

      - name: Test pi-gen Structure
        run: |
          cd pi-gen
          echo "Checking files..."
          if [ -f "./build.sh" ]; then
            echo "build.sh exists"
          else
            echo "ERROR: build.sh missing"
            exit 1
          fi
          
          if [ -d "./stage0" ]; then
            echo "stage0 directory exists"
          else
            echo "ERROR: stage0 missing"
            exit 1
          fi

      - name: Create Simple Config
        run: |
          cd pi-gen
          echo "IMG_NAME=passivestack-test" > config
          echo "RELEASE=bullseye" >> config
          echo "HOSTNAME=passivestack" >> config
          echo "STAGE_LIST=\"stage0 stage1 stage2\"" >> config
          echo "Config created:"
          cat config

      - name: Dry Run Build
        run: |
          cd pi-gen
          echo "This would run: sudo ./build.sh"
          echo "Dry run completed successfully"
