name: PassiveStack Pi-Image Build
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch zum Checkouten'
        required: false
        default: 'main'
        type: choice
        options:
          - main
          - master
          - develop
  push:
    tags:
      - 'v*'
      - 'release-*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read
      statuses: write
      id-token: write

    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Repository Info
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Tag: ${{ github.ref_name }}"

      - name: 🔧 Setup QEMU und Abhängigkeiten
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-user-static coreutils parted dosfstools kpartx rsync \
            bc binfmt-support build-essential crossbuild-essential-arm64 curl ca-certificates \
            git wget flex bison libssl-dev libncurses5-dev fakeroot debootstrap
          sudo rm -f /usr/local/bin/qemu-arm
          sudo ln -sf /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm
          sudo update-binfmts --enable qemu-arm

      - name: 📥 Clone offizielles pi-gen
        uses: actions/checkout@v4
        with:
          repository: RPi-Distro/pi-gen
          path: pi-gen
          fetch-depth: 1
          ref: master

      - name: 📁 Setup pi-gen Konfiguration
        run: |
          echo "IMG_NAME=passivestack" > pi-gen/config
          echo "RELEASE=bullseye" >> pi-gen/config
          echo "HOSTNAME=passivestack" >> pi-gen/config
          echo "FIRST_USER_NAME=pi" >> pi-gen/config
          echo "FIRST_USER_PASS=raspberry" >> pi-gen/config
          echo "ENABLE_SSH=1" >> pi-gen/config
          echo "TIMEZONE=Europe/Berlin" >> pi-gen/config
          echo "LOCALE_DEFAULT=de_DE.UTF-8" >> pi-gen/config
          echo "KEYBOARD_KEYMAP=de" >> pi-gen/config
          echo "KEYBOARD_LAYOUT=German" >> pi-gen/config
          echo "IMG_ROOTSIZE=3500" >> pi-gen/config
          echo "IMG_USERSIZE=1000" >> pi-gen/config
          echo "BUILD_KERNEL=false" >> pi-gen/config
          echo "COMPRESS_OUTPUTIMAGE=zip" >> pi-gen/config
          cat pi-gen/config

      - name: 📂 Kopiere PassiveStack Stage
        run: |
          set -euo pipefail
          STAGE_DIR="pi-gen/stage3"
          mkdir -p "${STAGE_DIR}"
          chmod -R 755 "${STAGE_DIR}"
          
          cat > "${STAGE_DIR}/00-run.sh" << 'EOF'
#!/bin/bash -e
echo "PassiveStack Stage 3 - Setup startet"
EOF
          
          cat > "${STAGE_DIR}/01-run.sh" << 'EOF'
#!/bin/bash -e
echo "PassiveStack Stage 3 - Docker Installation"
apt-get update
apt-get install -y \
    apt-transport-https \
    ca-certificates \
    curl \
    gnupg \
    lsb-release
curl -fsSL https://get.docker.com -o get-docker.sh
sh get-docker.sh
usermod -aG docker ${FIRST_USER_NAME}
systemctl enable docker
EOF
          
          cat > "${STAGE_DIR}/02-run.sh" << 'EOF'
#!/bin/bash -e
echo "PassiveStack Stage 3 - PassiveStack Setup"
cd /home/${FIRST_USER_NAME}
sudo -u ${FIRST_USER_NAME} git clone https://github.com/pinephosphore/passivestack.git
cd passivestack
chmod +x install.sh
touch .firstboot_pending
chown ${FIRST_USER_NAME}:${FIRST_USER_NAME} .firstboot_pending
EOF
          
          cat > "${STAGE_DIR}/03-run.sh" << 'EOF'
#!/bin/bash -e
echo "PassiveStack Stage 3 - Systemd Service Setup"
cat > /etc/systemd/system/passivestack-firstboot.service << 'SVC'
[Unit]
Description=PassiveStack First Boot Setup
After=network-online.target docker.service
Wants=network-online.target
ConditionPathExists=/home/pi/passivestack/.firstboot_pending
[Service]
Type=oneshot
ExecStart=/bin/bash /home/pi/passivestack/install.sh
ExecStartPost=/bin/rm -f /home/pi/passivestack/.firstboot_pending
RemainAfterExit=yes
User=pi
Group=pi
StandardOutput=journal+console
StandardError=journal+console
[Install]
WantedBy=multi-user.target
SVC
systemctl enable passivestack-firstboot.service
EOF
          
          cat > "${STAGE_DIR}/04-run.sh" << 'EOF'
#!/bin/bash -e
echo "PassiveStack Stage 3 - Optimierungen"
dphys-swapfile swapoff
dphys-swapfile uninstall
systemctl disable dphys-swapfile
sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
sed -i 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/' /etc/ssh/sshd_config
sed -i 's/PermitRootLogin yes/PermitRootLogin no/' /etc/ssh/sshd_config
cat >> /etc/docker/daemon.json << 'DOCK'
{
  "log-driver": "json-file",
  "log-opts": {
    "max-size": "10m",
    "max-file": "3"
  },
  "storage-driver": "overlay2"
}
DOCK
EOF
          
          cat > "${STAGE_DIR}/99-finish.sh" << 'EOF'
#!/bin/bash -e
echo "PassiveStack Stage 3 - Finalisierung"
cat > /etc/motd << 'MOTD'
#################################################
#     PassiveStack Raspberry Pi Image           #
#     https://passivecompute.de                 #
#                                               #
#     Das System wird automatisch eingerichtet. #
#     Bitte warten Sie bis zum ersten Boot.     #
#################################################
MOTD
cat > /etc/issue.net << 'BANNER'
PassiveStack Image - https://passivecompute.de
BANNER
echo "PassiveStack Image Build abgeschlossen"
EOF
          
          chmod +x "${STAGE_DIR}"/*.sh
          touch "${STAGE_DIR}/EXPORT_IMAGE"
          ls -la "${STAGE_DIR}/"

      - name: 🛠️ Run pi-gen Build
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          cd pi-gen
          cat config
          ls -la stage*
          sudo ./build.sh
          if [ $? -eq 0 ]; then
            echo "✅ Build erfolgreich!"
            ls -la deploy/
          else
            echo "❌ Build fehlgeschlagen!"
            exit 1
          fi

      - name: 📦 Upload Build-Resultate
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: passivestack-pi-image-${{ github.sha }}
          path: |
            pi-gen/deploy/*.zip
            pi-gen/deploy/*.img
          retention-days: 30
          if-no-files-found: error

      - name: 📝 Upload Logs (für Debugging)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-${{ github.sha }}
          path: |
            pi-gen/build.log
            pi-gen/debug/
            **/*.log
          retention-days: 7

      - name: 🧹 Aufräumen
        if: always()
        run: |
          sudo rm -rf pi-gen/work/
          sudo rm -rf pi-gen/deploy/

      - name: ✅ Build erfolgreich
        if: success()
        run: |
          echo "✅ PassiveStack Pi-Image Build abgeschlossen!"
          echo "📦 Das Image steht zum Download bereit."
          echo "🔧 Architektur: ARM64 (Raspberry Pi)"
          echo "📊 Release: Raspberry Pi OS Bullseye"
          echo "⚡ Enthält: Docker + PassiveStack Auto-Setup"
