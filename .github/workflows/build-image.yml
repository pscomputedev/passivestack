name: PassiveStack Pi-Image Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pi-gen Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            curl \
            wget \
            ca-certificates \
            qemu-user-static \
            parted \
            dosfstools \
            kpartx \
            rsync \
            bc \
            binfmt-support \
            build-essential \
            crossbuild-essential-arm64 \
            libssl-dev \
            libncurses5-dev \
            fakeroot \
            debootstrap \
            quilt \
            libarchive-tools \
            coreutils \
            zerofree \
            zip \
            jq

      - name: Clone pi-gen
        run: |
          git clone https://github.com/RPi-Distro/pi-gen.git
          cd pi-gen
          git checkout bullseye

      - name: Setup PassiveStack Stage Directory
        run: |
          cd pi-gen
          
          # Erstelle stage3-Verzeichnis für PassiveStack
          if [ -d "stage-passivestack" ]; then
            rm -rf stage-passivestack
          fi
          
          mkdir -p stage-passivestack
          
          # Erstelle das Skript für PassiveStack
          cat > stage-passivestack/00-run.sh << 'EOF'
#!/bin/bash
set -e

echo "PassiveStack installation stage"

# Installiere Docker
curl -fsSL https://get.docker.com -o get-docker.sh
sh get-docker.sh

# Installiere Docker Compose
curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose- $ (uname -s)- $ (uname -m)" -o /usr/local/bin/docker-compose
chmod +x /usr/local/bin/docker-compose

# Erstelle Verzeichnis für PassiveStack
mkdir -p /opt/passivestack

# Setze Hostname
echo "passivestack" > /etc/hostname
hostnamectl set-hostname passivestack

# Aktiviere SSH
touch /boot/ssh

# Konfiguriere Netzwerk
cat >> /etc/dhcpcd.conf << 'NETCONFIG'
interface eth0
static ip_address=192.168.1.100/24
static routers=192.168.1.1
static domain_name_servers=8.8.8.8 8.8.4.4

interface wlan0
static ip_address=192.168.1.101/24
static routers=192.168.1.1
static domain_name_servers=8.8.8.8 
