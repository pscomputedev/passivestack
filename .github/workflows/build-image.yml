name: PassiveStack Pi-Image Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git coreutils qemu-user-static \
            parted dosfstools kpartx rsync \
            bc binfmt-support debootstrap \
            quilt libarchive-tools zerofree

      - name: Clone and Setup pi-gen
        run: |
          git clone https://github.com/RPi-Distro/pi-gen.git
          cd pi-gen
          git checkout bullseye

      - name: Create Minimal Stage3
        run: |
          cd pi-gen
          
          # Erstelle stage3-Verzeichnis (pi-gen erwartet stage3 für Raspberry Pi OS Lite)
          mkdir -p stage3
          
          # Minimales Stage-Script - nur zur Validierung
          cat << 'EOF' > stage3/00-run.sh
#!/bin/bash
set -e

echo "=== PassiveStack Stage 3 ==="
echo "Stage completed successfully"
EOF
          
          chmod +x stage3/00-run.sh
          
          echo "Created minimal stage3"

      - name: Create Config File
        run: |
          cd pi-gen
          
          # WICHTIG: PI_GEN muss absolut sein
          PI_GEN=$(pwd)
          
          cat << EOF > config
IMG_NAME=passivestack
RELEASE=bullseye
HOSTNAME=passivestack
FIRST_USER_NAME=pi
FIRST_USER_PASS=raspberry
ENABLE_SSH=1
STAGE_LIST="stage0 stage1 stage2 stage3"
WORK_DIR="${PI_GEN}/work"
DEPLOY_DIR="${PI_GEN}/deploy"
CLEAN=1
EOF
          
          echo "Config created:"
          cat config

      - name: Validate Setup
        run: |
          cd pi-gen
          
          echo "=== Validating Setup ==="
          ls -la
          echo ""
          echo "Stages:"
          ls -la stage*/
          echo ""
          echo "build.sh permissions:"
          ls -la build.sh
          
          # Prüfe ob build.sh existiert
          if [ ! -f "build.sh" ]; then
            echo "❌ build.sh not found"
            exit 1
          fi
          
          chmod +x build.sh
          echo "✅ Setup validated"

      - name: Run pi-gen with sudo
        run: |
          cd pi-gen
          
          echo "=== Starting pi-gen build ==="
          echo "This will take 60-90 minutes..."
          
          # PI-GEN MIT SUDO AUSFÜHREN
          sudo ./build.sh 2>&1 | tee build.log &
          BUILD_PID=$!
          
          # Warte maximal 5 Minuten auf ersten Erfolg
          sleep 300
          
          # Prüfe ob Prozess noch läuft
          if ps -p $BUILD_PID > /dev/null; then
            echo "✅ Build is running (5 minutes passed)"
            echo "Build will continue in background..."
            
            # Upload partial logs
            tail -n 50 build.log
          else
            echo "❌ Build process died"
            echo "Last 50 lines:"
            tail -n 50 build.log
            exit 1
          fi

      - name: Monitor Build
        run: |
          cd pi-gen
          
          echo "=== Monitoring Build ==="
          
          # Warte weitere 10 Minuten
          sleep 600
          
          if [ -f "build.log" ]; then
            echo "Last status:"
            tail -n 20 build.log
            
            if grep -q "Stage 0 completed" build.log; then
              echo "✅ Stage 0 completed successfully!"
              exit 0
            elif grep -q "ERROR\|Failed\|Error" build.log; then
              echo "❌ Error detected in logs"
              exit 1
            else
              echo "⚠️ Build still in progress"
              echo "Continuing..."
            fi
          else
            echo "❌ No build.log found"
            exit 1
          fi

      - name: Complete Build
        run: |
          cd pi-gen
          
          echo "=== Completing Build ==="
          
          # Warte auf Build-Ende (max 2 Stunden total)
          timeout 3600 tail --pid=$(pidof build.sh) -f /dev/null
          
          if [ $? -eq 0 ]; then
            echo "✅ Build completed"
            
            if [ -d "deploy" ]; then
              echo "Images generated:"
              find deploy/ -type f | while read f; do
                echo "  - $(basename "$f")"
              done
            fi
          else
            echo "❌ Build timed out"
            exit 1
          fi

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            pi-gen/build.log
            pi-gen/config
          retention-days: 7

      - name: Upload Image Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: passivestack-image
          path: pi-gen/deploy/*
          retention-days: 30
