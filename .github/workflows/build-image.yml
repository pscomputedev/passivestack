name: Build Raspberry Pi Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker (bereits vorhanden auf ubuntu-latest)
        run: docker --version

      - name: Clone pi-gen
        run: git clone --depth 1 https://github.com/RPi-Distro/pi-gen.git

      - name: Configure build
        working-directory: pi-gen
        run: |
          cat > config <<EOF
          IMG_NAME=raspios-bookworm
          RELEASE=bookworm
          DEPLOY_ZIP=1
          LOCALE_DEFAULT=de_DE.UTF-8
          TARGET_HOSTNAME=raspberrypi
          KEYBOARD_KEYMAP=de
          KEYBOARD_LAYOUT=German
          TIMEZONE_DEFAULT=Europe/Berlin
          FIRST_USER_NAME=pi
          FIRST_USER_PASS=raspberry
          ENABLE_SSH=1
          STAGE_LIST=stage0 stage1
          EOF

      - name: Build image via Docker
        working-directory: pi-gen
        run: |
          ./build-docker.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: raspios-image
          path: pi-gen/deploy/*.zip
          if-no-files-found: error
