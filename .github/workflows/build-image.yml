name: Build Raspberry Pi Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install qemu-user-static
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          sudo ln -s /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm

      - name: Clone pi-gen (bookworm branch)
        run: git clone --depth 1 --branch bookworm https://github.com/RPi-Distro/pi-gen.git

      - name: Configure build
        working-directory: pi-gen
        run: |
          echo 'IMG_NAME=raspios-bookworm' > config
          echo 'RELEASE=bookworm' >> config
          echo 'DEPLOY_ZIP=1' >> config
          echo 'LOCALE_DEFAULT=de_DE.UTF-8' >> config
          echo 'TARGET_HOSTNAME=raspberrypi' >> config
          echo 'KEYBOARD_KEYMAP=de' >> config
          echo 'KEYBOARD_LAYOUT=German' >> config
          echo 'TIMEZONE_DEFAULT=Europe/Berlin' >> config
          echo 'FIRST_USER_NAME=pi' >> config
          echo 'FIRST_USER_PASS=raspberry' >> config
          echo 'ENABLE_SSH=1' >> config
          echo 'PUBKEY_ONLY_SSH=0' >> config
          echo 'STAGE_LIST="stage0 stage1 stage2"' >> config

      - name: Build image via Docker
        working-directory: pi-gen
        env:
          PIGEN_DOCKER_OPTS: "-v /usr/bin/qemu-arm-static:/usr/bin/qemu-arm-static"
        run: ./build-docker.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: raspios-image
          path: |
            pi-gen/deploy/*.zip
            pi-gen/deploy/*.img
            pi-gen/deploy/*.img.xz
          if-no-files-found: error
