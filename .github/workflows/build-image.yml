name: Build PassiveStack Pi Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Dependencies installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static qemu-utils kpartx \
            debootstrap zerofree zip dosfstools libcap2-bin rsync \
            xz-utils file git curl bc libarchive-tools arch-test

      - name: pi-gen klonen
        run: |
          git clone --depth 1 https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen

      - name: PassiveStack Stage einrichten
        run: |
          cp -r image/stage-passivestack /tmp/pi-gen/stage-passivestack
          mkdir -p /tmp/pi-gen/stage-passivestack/00-passivestack/files
          cp -r . /tmp/pi-gen/stage-passivestack/00-passivestack/files/passivestack/
          touch /tmp/pi-gen/stage3/SKIP
          touch /tmp/pi-gen/stage4/SKIP
          touch /tmp/pi-gen/stage5/SKIP
          touch /tmp/pi-gen/stage4/SKIP_IMAGES
          touch /tmp/pi-gen/stage5/SKIP_IMAGES

      - name: pi-gen Config erstellen
        run: |
          echo "IMG_NAME=PassiveStack-v1.3" > /tmp/pi-gen/config
          echo "RELEASE=bookworm" >> /tmp/pi-gen/config
          echo "TARGET_HOSTNAME=passivestack" >> /tmp/pi-gen/config
          echo "FIRST_USER_NAME=pi" >> /tmp/pi-gen/config
          echo "FIRST_USER_PASS=passivestack" >> /tmp/pi-gen/config
          echo "ENABLE_SSH=1" >> /tmp/pi-gen/config
          echo "KEYBOARD_KEYMAP=de" >> /tmp/pi-gen/config
          echo "KEYBOARD_LAYOUT=German" >> /tmp/pi-gen/config
          echo "TIMEZONE_DEFAULT=Europe/Berlin" >> /tmp/pi-gen/config
          echo "LOCALE_DEFAULT=de_DE.UTF-8" >> /tmp/pi-gen/config
          echo "STAGE_LIST=stage0 stage1 stage2 stage-passivestack" >> /tmp/pi-gen/config
          echo "COMPRESS=xz" >> /tmp/pi-gen/config

      - name: Pi-Image bauen
        run: |
          cd /tmp/pi-gen
          sudo
